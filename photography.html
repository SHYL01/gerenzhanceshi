<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Photography | ShoneyL</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="gradient-field" aria-hidden="true"></div>
    <div class="grain" aria-hidden="true"></div>

    <header class="site-header">
      <a class="brand" href="./index.html" aria-label="ShoneyL home">
        <span class="brand-mark">SL</span>
        <span>ShoneyL</span>
      </a>
      <nav>
        <a href="./index.html">Home</a>
        <a href="./photography.html">Photography</a>
        <a href="./motion.html">Motion</a>
      </nav>
    </header>

    <main class="portfolio-page">
      <section class="portfolio-hero">
        <p class="eyebrow">Selected Photography</p>
        <h1>摄影作品</h1>
        <p>完整摄影作品以横向流动画廊呈现。鼠标放到卡片上会暂停流动并放大，点击后查看完整作品。</p>
      </section>

      <section class="flow-gallery" data-portfolio="photos" aria-label="ShoneyL 摄影作品流动画廊"></section>
    </main>

    <div class="portfolio-modal" id="portfolioModal" hidden>
      <button class="modal-close" id="closeModal" type="button" aria-label="关闭作品">×</button>
      <div class="modal-stage" id="modalStage"></div>
      <p id="modalCaption"></p>
    </div>

    <div class="page-progress" aria-hidden="true"><span id="pageProgress"></span></div>
    <script src="./portfolio-data.js"></script>
    <script src="./script.js"></script>
  </body>
</html>
